<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />
  <title>Marco Peluso — Developer & Tech Blog</title>

  <base href="/" />

  <meta name="description" content="Portfolio di Marco Peluso. Progetti, competenze e un blog sulla tecnologia aggiornato ogni giorno." />

  <!-- Security hardening -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Open Graph -->
  <meta property="og:title" content="Marco Peluso — Developer & Tech Blog" />
  <meta property="og:description" content="Portfolio e blog sulla tecnologia aggiornato ogni giorno." />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body>
  <app-root></app-root>
</body>

</html>
